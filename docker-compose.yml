# ── ZypherCenter — Deployment Compose ────────────────────────────────────────
# Single pre-built image from GHCR. No source checkout or build tools required.
#
# Quick start:
#   1. Copy this file and .env.example to your server
#   2. cp .env.example .env  &&  edit .env (set PROXMOX_HOST + SESSION_SECRET)
#   3. docker compose pull
#   4. docker compose up -d
#
# Or without compose (single docker run):
#   docker run -d -p 80:80 \
#     -e PROXMOX_HOST=https://YOUR_PROXMOX:8006 \
#     -e SESSION_SECRET=$(openssl rand -hex 32) \
#     --name zyphercenter --restart unless-stopped \
#     ghcr.io/zypher-systems/zyphercenter:latest
# ─────────────────────────────────────────────────────────────────────────────

services:
  zyphercenter:
    image: ghcr.io/zypher-systems/zyphercenter:${IMAGE_TAG:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      # ── Proxmox connection ─────────────────────────────────────────────────
      # Full URL to your Proxmox host, including port 8006.
      # If omitted, users enter the host URL on the login page.
      PROXMOX_HOST: ${PROXMOX_HOST:-}

      # Set to "false" to allow self-signed certificates (common in home labs).
      PROXMOX_TLS_VERIFY: ${PROXMOX_TLS_VERIFY:-false}

      # ── Session security ───────────────────────────────────────────────────
      # Must be at least 32 characters. Generate: openssl rand -hex 32
      # If left empty, a random secret is generated at startup
      # (sessions reset on container restart — fine for testing).
      SESSION_SECRET: ${SESSION_SECRET:-}

      # ── Cookie security ────────────────────────────────────────────────────
      # Set to "true" only if serving ZypherCenter over HTTPS.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}

      LOG_LEVEL: ${LOG_LEVEL:-info}

    restart: unless-stopped
